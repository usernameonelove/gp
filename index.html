<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym Progress" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=4">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png?v=4">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png?v=4">
  <title>Gym Progress</title>
  <style>
    :root {
      --bg: #000;
      --card: #0d0d0d;
      --card2: #141414;
      --line: #232323;
      --text: #f2f2f2;
      --muted: #8d8d8d;
      --bad: #ff3b30;
      --mid: #ffcc00;
      --good: #32d74b;
      --input: #080808;
      --radius: 18px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 4px 2px 0;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .date {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(14px);
      z-index: 10;
      padding: 8px 0;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      border-radius: 999px;
      min-height: 38px;
      font-size: 13px;
      cursor: pointer;
    }

    .tab.active {
      color: var(--text);
      background: #1c1c1c;
      border-color: #3a3a3a;
    }

    section { display: none; }
    section.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }

    .card-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .muted { color: var(--muted); }
    .small { font-size: 12px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--input);
      color: var(--text);
      border-radius: 14px;
      padding: 13px 12px;
      font-size: 15px;
      outline: none;
    }

    textarea { resize: vertical; min-height: 78px; }

    input:focus, select:focus, textarea:focus { border-color: #555; }

    button {
      border: 1px solid var(--line);
      background: var(--card2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      cursor: pointer;
    }

    button.primary {
      width: 100%;
      background: #f2f2f2;
      color: #000;
      border: none;
      font-weight: 700;
      margin-top: 8px;
    }

    button.danger {
      color: var(--bad);
      background: transparent;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding: 12px 0 0;
      margin-top: 12px;
    }

    .row:first-child { border-top: 0; padding-top: 0; margin-top: 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 9px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bad);
    }

    .dot.mid { background: var(--mid); }
    .dot.good { background: var(--good); }

    .bar {
      height: 8px;
      background: #1b1b1b;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--bad);
      transition: width .25s ease;
    }

    .fill.mid { background: var(--mid); }
    .fill.good { background: var(--good); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }

    .stat b {
      display: block;
      font-size: 19px;
      letter-spacing: -0.03em;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
    }

    .exercise-name {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .set-line {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.35;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 22px 8px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      font-size: 14px;
    }

    .goal-item {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .goal-item:first-child { border-top: 0; }

    .check {
      width: 22px;
      height: 22px;
      border: 1px solid #444;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #000;
      font-size: 13px;
      cursor: pointer;
    }

    .check.done {
      background: var(--good);
      border-color: var(--good);
    }

    .goal-text.done {
      color: var(--muted);
      text-decoration: line-through;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .segmented button {
      font-size: 12px;
      padding: 10px 8px;
      color: var(--muted);
    }

    .segmented button.active {
      color: var(--text);
      border-color: #555;
      background: #1c1c1c;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden-file { display: none; }

    @media (max-width: 370px) {
      .app { padding: 12px; }
      .tabs { gap: 6px; }
      .tab { font-size: 12px; min-height: 36px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Gym Aleshka</h1>
        <div class="date" id="todayLabel"></div>
      </div>
      <div class="pill" id="weekStatus"><span class="dot"></span><span>0%</span></div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="today">today</button>
      <button class="tab" data-tab="history">history</button>
      <button class="tab" data-tab="progress">progress</button>
      <button class="tab" data-tab="goals">goals</button>
    </nav>

    <section id="today" class="active">
      <div class="stats">
        <div class="stat"><b id="todaySets">0</b><span>подходов</span></div>
        <div class="stat"><b id="todayVolume">0</b><span>объем</span></div>
        <div class="stat"><b id="todayExercises">0</b><span>упражнений</span></div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>new entry</h2>
          <span class="muted small">вес × повторы</span>
        </div>
        <div style="display:grid; gap:8px;">
          <input id="exercise" list="exerciseList" placeholder="Упражнение" autocomplete="off" />
          <datalist id="exerciseList"></datalist>
          <div class="grid">
            <input id="weight" type="number" inputmode="decimal" placeholder="Вес, кг" />
            <input id="reps" type="number" inputmode="numeric" placeholder="Повторы" />
          </div>
          <div class="grid">
            <input id="sets" type="number" inputmode="numeric" placeholder="Подходы" value="1" />
            <input id="note" placeholder="Заметка" />
          </div>
          <button class="primary" id="addSet">added</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>today</h2>
          <button class="danger" id="clearToday">clear</button>
        </div>
        <div id="todayList"></div>
      </div>
    </section>

    <section id="history">
      <div class="card">
        <div class="card-title">
          <h2>history</h2>
          <span class="muted small" id="totalWorkouts">0 тренировок</span>
        </div>
        <div id="historyList"></div>
      </div>
    </section>

    <section id="progress">
      <div class="card">
        <div class="card-title">
          <h2>statistics</h2>
          <span class="muted small">7 дней</span>
        </div>
        <div class="row">
          <div>
            <div class="exercise-name">Цель тренировок</div>
            <div class="set-line" id="weekText">0 из 3 тренировок</div>
            <div class="bar"><div class="fill" id="weekFill"></div></div>
          </div>
          <div class="pill" id="weekPercent"><span class="dot"></span><span>0%</span></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>best result</h2>
          <span class="muted small">по упражнениям</span>
        </div>
        <div id="recordsList"></div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>Данные</h2>
          <span class="muted small">backup</span>
        </div>
        <div class="actions">
          <button id="exportData">Экспорт</button>
          <button id="importBtn">Импорт</button>
        </div>
        <input class="hidden-file" id="importFile" type="file" accept="application/json" />
      </div>
    </section>

    <section id="goals">
      <div class="card">
        <div class="card-title">
          <h2>Goals</h2>
          <span class="muted small" id="goalProgress">0%</span>
        </div>
        <div class="segmented">
          <button class="period active" data-period="day">Day</button>
          <button class="period" data-period="week">Week</button>
          <button class="period" data-period="month">Month</button>
          <button class="period" data-period="year">Year</button>
        </div>
        <div style="display:grid; gap:8px;">
          <input id="goalInput" placeholder="Например: 3 тренировки" />
          <button class="primary" id="addGoal">added goals</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2 id="goalTitle">day</h2>
          <button class="danger" id="clearGoals">clear</button>
        </div>
        <div id="goalsList"></div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "gym_progress_v1";
    const today = () => new Date().toISOString().slice(0, 10);
    const niceDate = (iso) => new Date(iso + "T00:00:00").toLocaleDateString("ru-RU", { day: "2-digit", month: "short", weekday: "short" });

    const defaultData = {
      entries: [],
      goals: { day: [], week: [], month: [], year: [] },
      settings: { weeklyTarget: 3 }
    };

    let data = load();
    let activeGoalPeriod = "day";

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || structuredClone(defaultData);
      } catch {
        return structuredClone(defaultData);
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function colorClass(percent) {
      if (percent >= 75) return "good";
      if (percent >= 40) return "mid";
      return "bad";
    }

    function setIndicator(el, percent) {
      const cls = colorClass(percent);
      const dot = el.querySelector(".dot");
      dot.className = "dot" + (cls === "bad" ? "" : " " + cls);
      el.querySelector("span:last-child").textContent = Math.min(100, Math.round(percent)) + "%";
    }

    function entriesToday() {
      return data.entries.filter(e => e.date === today());
    }

    function weekStart(date = new Date()) {
      const d = new Date(date);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      d.setHours(0,0,0,0);
      return d;
    }

    function entriesThisWeek() {
      const start = weekStart();
      return data.entries.filter(e => new Date(e.date + "T00:00:00") >= start);
    }

    function workoutDates(entries) {
      return [...new Set(entries.map(e => e.date))];
    }

    function volume(entries) {
      return entries.reduce((sum, e) => sum + Number(e.weight || 0) * Number(e.reps || 0) * Number(e.sets || 1), 0);
    }

    function renderToday() {
      const list = document.getElementById("todayList");
      const items = entriesToday().sort((a,b) => b.createdAt - a.createdAt);
      document.getElementById("todaySets").textContent = items.reduce((s,e)=>s+Number(e.sets||1),0);
      document.getElementById("todayVolume").textContent = Math.round(volume(items));
      document.getElementById("todayExercises").textContent = new Set(items.map(e => e.exercise)).size;

      if (!items.length) {
        list.innerHTML = `<div class="empty">Записей пока нет</div>`;
        return;
      }

      list.innerHTML = items.map(e => `
        <div class="row">
          <div>
            <div class="exercise-name">${escapeHtml(e.exercise)}</div>
            <div class="set-line">${e.weight} кг × ${e.reps} × ${e.sets} ${e.note ? "· " + escapeHtml(e.note) : ""}</div>
          </div>
          <button class="danger" onclick="removeEntry('${e.id}')">×</button>
        </div>
      `).join("");
    }

    function renderHistory() {
      const list = document.getElementById("historyList");
      const groups = groupByDate(data.entries);
      const dates = Object.keys(groups).sort().reverse();
      document.getElementById("totalWorkouts").textContent = `${dates.length} тренировок`;

      if (!dates.length) {
        list.innerHTML = `<div class="empty">История пустая</div>`;
        return;
      }

      list.innerHTML = dates.map(date => {
        const items = groups[date];
        const sets = items.reduce((s,e)=>s+Number(e.sets||1),0);
        const vol = Math.round(volume(items));
        return `
          <div class="row" style="display:block;">
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
              <div class="exercise-name">${niceDate(date)}</div>
              <div class="pill"><span>${sets} п.</span><span>${vol} кг</span></div>
            </div>
            <div class="set-line">${items.map(e => `${escapeHtml(e.exercise)}: ${e.weight}×${e.reps}×${e.sets}`).join(" · ")}</div>
          </div>
        `;
      }).join("");
    }

    function renderProgress() {
      const weekEntries = entriesThisWeek();
      const done = workoutDates(weekEntries).length;
      const target = data.settings.weeklyTarget;
      const percent = target ? done / target * 100 : 0;
      const cls = colorClass(percent);

      document.getElementById("weekText").textContent = `${done} из ${target} тренировок`;
      const fill = document.getElementById("weekFill");
      fill.style.width = Math.min(100, percent) + "%";
      fill.className = "fill" + (cls === "bad" ? "" : " " + cls);
      setIndicator(document.getElementById("weekPercent"), percent);
      setIndicator(document.getElementById("weekStatus"), percent);

      const records = getRecords();
      const recordsList = document.getElementById("recordsList");
      if (!records.length) {
        recordsList.innerHTML = `<div class="empty">Рекордов пока нет</div>`;
        return;
      }

      recordsList.innerHTML = records.map(r => `
        <div class="row">
          <div>
            <div class="exercise-name">${escapeHtml(r.exercise)}</div>
            <div class="set-line">лучший вес: ${r.maxWeight} кг · лучший объем: ${Math.round(r.maxVolume)}</div>
          </div>
        </div>
      `).join("");
    }

    function renderGoals() {
      const goals = data.goals[activeGoalPeriod] || [];
      const done = goals.filter(g => g.done).length;
      const percent = goals.length ? done / goals.length * 100 : 0;
      const names = { day: "День", week: "Неделя", month: "Месяц", year: "Год" };

      document.getElementById("goalTitle").textContent = names[activeGoalPeriod];
      document.getElementById("goalProgress").textContent = Math.round(percent) + "%";

      const list = document.getElementById("goalsList");
      if (!goals.length) {
        list.innerHTML = `<div class="empty">Целей пока нет</div>`;
        return;
      }

      list.innerHTML = goals.map(g => `
        <div class="goal-item">
          <div class="check ${g.done ? "done" : ""}" onclick="toggleGoal('${g.id}')">${g.done ? "✓" : ""}</div>
          <div class="goal-text ${g.done ? "done" : ""}">${escapeHtml(g.text)}</div>
          <button class="danger" onclick="removeGoal('${g.id}')">×</button>
        </div>
      `).join("");
    }

    function renderExerciseList() {
      const datalist = document.getElementById("exerciseList");
      const names = [...new Set(data.entries.map(e => e.exercise))].sort();
      datalist.innerHTML = names.map(n => `<option value="${escapeHtml(n)}"></option>`).join("");
    }

    function render() {
      document.getElementById("todayLabel").textContent = new Date().toLocaleDateString("ru-RU", { day: "2-digit", month: "long", year: "numeric" });
      renderToday();
      renderHistory();
      renderProgress();
      renderGoals();
      renderExerciseList();
    }

    function groupByDate(entries) {
      return entries.reduce((acc, e) => {
        acc[e.date] ||= [];
        acc[e.date].push(e);
        return acc;
      }, {});
    }

    function getRecords() {
      const map = {};
      for (const e of data.entries) {
        const key = e.exercise.trim().toLowerCase();
        const vol = Number(e.weight || 0) * Number(e.reps || 0) * Number(e.sets || 1);
        if (!map[key]) map[key] = { exercise: e.exercise, maxWeight: 0, maxVolume: 0 };
        map[key].maxWeight = Math.max(map[key].maxWeight, Number(e.weight || 0));
        map[key].maxVolume = Math.max(map[key].maxVolume, vol);
      }
      return Object.values(map).sort((a,b) => b.maxVolume - a.maxVolume);
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;","\"":"&quot;"}[c]));
    }

    window.removeEntry = function(id) {
      data.entries = data.entries.filter(e => e.id !== id);
      save();
    };

    window.toggleGoal = function(id) {
      const goal = data.goals[activeGoalPeriod].find(g => g.id === id);
      if (goal) goal.done = !goal.done;
      save();
    };

    window.removeGoal = function(id) {
      data.goals[activeGoalPeriod] = data.goals[activeGoalPeriod].filter(g => g.id !== id);
      save();
    };

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    document.querySelectorAll(".period").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".period").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeGoalPeriod = btn.dataset.period;
        renderGoals();
      });
    });

    document.getElementById("addSet").addEventListener("click", () => {
      const exercise = document.getElementById("exercise").value.trim();
      const weight = Number(document.getElementById("weight").value);
      const reps = Number(document.getElementById("reps").value);
      const sets = Number(document.getElementById("sets").value || 1);
      const note = document.getElementById("note").value.trim();

      if (!exercise || !weight || !reps || !sets) return alert("Заполни упражнение, вес, повторы и подходы");

      data.entries.push({ id: uid(), date: today(), exercise, weight, reps, sets, note, createdAt: Date.now() });
      document.getElementById("weight").value = "";
      document.getElementById("reps").value = "";
      document.getElementById("sets").value = "1";
      document.getElementById("note").value = "";
      save();
    });

    document.getElementById("clearToday").addEventListener("click", () => {
      if (!confirm("Очистить записи за сегодня?")) return;
      data.entries = data.entries.filter(e => e.date !== today());
      save();
    });

    document.getElementById("addGoal").addEventListener("click", () => {
      const input = document.getElementById("goalInput");
      const text = input.value.trim();
      if (!text) return;
      data.goals[activeGoalPeriod].push({ id: uid(), text, done: false, createdAt: Date.now() });
      input.value = "";
      save();
    });

    document.getElementById("clearGoals").addEventListener("click", () => {
      if (!confirm("Очистить цели этого периода?")) return;
      data.goals[activeGoalPeriod] = [];
      save();
    });

    document.getElementById("exportData").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `gym-progress-${today()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      document.getElementById("importFile").click();
    });

    document.getElementById("importFile").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const imported = JSON.parse(await file.text());
        if (!imported.entries || !imported.goals) throw new Error("bad file");
        data = imported;
        save();
      } catch {
        alert("Не удалось импортировать файл");
      }
    });

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }

    render();
  </script>
</body>
